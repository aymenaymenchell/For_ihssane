<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى إحسان ❤️</title>
    <style>
        body {
            background-color: #ffeef2;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden; /* ضروري لتأثير تساقط القلوب */
            position: relative;
        }

        .container {
            background-color: #fff;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(255, 182, 193, 0.5);
            text-align: center;
            width: 80%;
            max-width: 400px;
            transition: transform 0.3s ease;
            position: relative;
            z-index: 10; /* ليكون فوق القلوب */
        }

        /* --- حاوية الصورة --- */
        .cat-container {
            height: 160px;
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* --- القطة اللطيفة --- */
        .cat-normal { position: relative; width: 120px; height: 100px; display: block; }
        .cat-head { position: absolute; width: 100%; height: 100%; background-color: #f48fb1; border-radius: 50% 50% 40% 40%; bottom: 0; }
        .ear { position: absolute; width: 40px; height: 40px; background-color: #f48fb1; border-radius: 10px; z-index: -1; }
        .ear.left { top: -10px; left: 0; transform: rotate(-15deg); }
        .ear.right { top: -10px; right: 0; transform: rotate(15deg); }
        .eye { position: absolute; width: 12px; height: 12px; background-color: #333; border-radius: 50%; top: 35px; }
        .eye.left { left: 25px; } .eye.right { right: 25px; }
        .nose { position: absolute; width: 6px; height: 4px; background-color: #c2185b; border-radius: 50%; top: 55px; left: 50%; transform: translateX(-50%); }
        .mouth { position: absolute; width: 10px; height: 5px; border-bottom: 2px solid #333; border-radius: 50%; top: 60px; left: 50%; transform: translateX(-50%); }

        /* --- القطة الغاضبة --- */
        .cat-angry { position: relative; width: 120px; height: 100px; display: none; }
        .cat-angry .cat-head { background-color: #d81b60; }
        .cat-angry .ear { background-color: #d81b60; }
        .cat-angry .eye { background-color: #ff0000; width: 14px; height: 4px; border-radius: 0; top: 38px; transform: rotate(-10deg); box-shadow: 0 0 5px #ff0000; }
        .cat-angry .eye.right { transform: rotate(10deg); }
        .cat-angry .mouth { border-bottom: none; border-top: 2px solid #333; border-radius: 50% 50% 0 0; top: 65px; }

        /* تأثير الاهتزاز للغضب */
        @keyframes catShake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            100% { transform: translate(-1px, -1px) rotate(1deg); }
        }
        .cat-angry.active-mood { animation: catShake 0.1s infinite alternate; }

        /* تأثير النار */
        .fire-effect { position: absolute; width: 100px; height: 40px; top: 10px; left: 50%; transform: translateX(-50%); background: radial-gradient(circle, rgba(255,69,0,1) 0%, rgba(255,140,0,0) 70%); filter: blur(8px); opacity: 0; animation: fireFlicker 0.4s infinite alternate; }
        .cat-angry.active-mood .fire-effect { opacity: 0.8; }
        @keyframes fireFlicker { from { opacity: 0.6; transform: translateX(-50%) scale(1); } to { opacity: 0.9; transform: translateX(-50%) scale(1.1); } }

        /* رسالة الغضب */
        .angry-message { color: #d32f2f; font-weight: bold; font-size: 1.2em; margin-bottom: 20px; display: none; }
        .angry-message.active-mood { display: block; animation: flashMsg 1s infinite alternate; }
        @keyframes flashMsg { from { opacity: 1; } to { opacity: 0.5; } }

        /* نص السؤال */
        h1#question-text { color: #d81b60; font-size: 1.8em; margin-bottom: 30px; min-height: 2.4em; transition: opacity 0.3s; }

        /* حاوية الأزرار */
        .buttons-container { display: flex; justify-content: center; gap: 20px; align-items: center; position: relative; height: 60px; }

        /* زر ايه */
        button#yes-btn { background-color: #f48fb1; color: #fff; border: none; padding: 15px 30px; border-radius: 50px; font-size: 1.2em; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 5px 10px rgba(244, 143, 177, 0.4); z-index: 5; }

        /* زر لالا (الهرب) */
        button#no-btn { background-color: #f0f0f0; color: #888; border: none; padding: 10px 20px; border-radius: 50px; font-size: 1em; cursor: pointer; transition: background-color 0.2s; position: absolute; z-index: 10; }

        /* نص الانفجار النهائي */
        .exploded-text { display: none; color: #d81b60; font-size: 3em; font-weight: bold; text-align: center; animation: popIn 0.5s ease; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); white-space: nowrap; z-index: 20; }
        @keyframes popIn { 0% { transform: translate(-50%, -50%) scale(0); opacity: 0; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } }

        /* أنيميشن الانفجار */
        @keyframes explosion-animation { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(10); opacity: 0.5; filter: blur(2px); } 100% { transform: scale(50); opacity: 0; display: none; } }
        .explosion-effect { animation: explosion-animation 0.7s ease forwards; }

        /* --- تأثير تساقط القلوب --- */
        .heart {
            position: absolute;
            width: 15px; height: 15px;
            background-color: #f48fb1;
            transform: rotate(45deg);
            opacity: 0.7;
            animation: fall infinite linear;
            z-index: 1;
        }
        .heart::before, .heart::after {
            content: "";
            position: absolute;
            width: 15px; height: 15px;
            background-color: #f48fb1;
            border-radius: 50%;
        }
        .heart::before { top: -7.5px; left: 0; }
        .heart::after { top: 0; left: -7.5px; }

        @keyframes fall {
            0% { top: -50px; transform: rotate(45deg) translateX(0); }
            100% { top: 100vh; transform: rotate(45deg) translateX(100px); }
        }

    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="رابط_مباشر_لملف_صوتي_mp3_هنا" type="audio/mpeg">
    </audio>

    <div class="container" id="main-container">
        <div class="cat-container" id="cat-visual">
            <div class="cat-normal" id="normal-state">
                <div class="ear left"></div><div class="ear right"></div>
                <div class="cat-head"><div class="eye left"></div><div class="eye right"></div><div class="nose"></div><div class="mouth"></div></div>
            </div>
            <div class="cat-angry" id="angry-state">
                <div class="fire-effect"></div>
                <div class="ear left"></div><div class="ear right"></div>
                <div class="cat-head"><div class="eye left"></div><div class="eye right"></div><div class="nose"></div><div class="mouth"></div></div>
            </div>
        </div>

        <div class="angry-message" id="error-msg">خيري ايه 😾🔥</div>
        <h1 id="question-text">تحبيني؟</h1>

        <div class="buttons-container" id="btns-holder">
            <button id="yes-btn">ايه</button>
            <button id="no-btn">لالا</button>
        </div>

        <div class="exploded-text" id="final-message">انا ثات نحبك ❤️</div>
    </div>

    <script>
        const questions = ["تحبيني؟", "تحبيني بزاف؟", "تحبيني اكثر من اي واحد فالدنيا؟"];
        let currentQuestion = 0;
        let yesButtonScale = 1;
        
        const qText = document.getElementById('question-text');
        const yesBtn = document.getElementById('yes-btn');
        const noBtn = document.getElementById('no-btn');
        const mainContainer = document.getElementById('main-container');
        const finalMessage = document.getElementById('final-message');
        const normalState = document.getElementById('normal-state');
        const angryState = document.getElementById('angry-state');
        const errorMsg = document.getElementById('error-msg');
        const bgMusic = document.getElementById('bg-music');

        // وظائف تغيير الحالة
        function setMood(mood) {
            if (mood === 'angry') {
                normalState.style.display = 'none';
                angryState.style.display = 'block';
                angryState.classList.add('active-mood');
                errorMsg.classList.add('active-mood');
            } else {
                normalState.style.display = 'block';
                angryState.style.display = 'none';
                angryState.classList.remove('active-mood');
                errorMsg.classList.remove('active-mood');
            }
        }

        // منطق الهرب لزر "لالا" (The Runaway logic)
        function moveButton() {
            // حساب حدود الـ container أو الشاشة
            const container = document.getElementById('btns-holder');
            const containerRect = container.getBoundingClientRect();
            
            // حساب الموضع الجديد العشوائي داخل حدود الـ container
            const maxX = containerRect.width - noBtn.offsetWidth;
            const maxY = 200; // مسافة عشوائية للأعلى
            
            const randomX = Math.floor(Math.random() * maxX) - (maxX/2); // عشوائي أفقي
            const randomY = Math.floor(Math.random() * maxY) - (maxY/2); // عشوائي عمودي

            noBtn.style.transition = 'all 0.1s ease-out'; // حركة سريعة ومفاجئة
            noBtn.style.left = `${randomX}px`;
            noBtn.style.top = `${randomY}px`;
        }

        // تفعيل الهرب عند التمرير بالماوس أو اللمس
        noBtn.addEventListener('mouseover', moveButton);
        noBtn.addEventListener('touchstart', moveButton); // مهم لأجهزة اللمس

        // منطق "ايه"
        yesBtn.addEventListener('click', function() {
            // تشغيل الموسيقى عند أول ضغطة
            if (currentQuestion === 0) {
                bgMusic.play().catch(error => console.log("المتصفح منع التشغيل التلقائي للصوت"));
            }

            currentQuestion++;
            yesButtonScale += 1.2;
            yesBtn.style.transform = `scale(${yesButtonScale})`;
            setMood('normal');
            
            // إعادة تعيين زر لالا
            noBtn.style.left = 'auto';
            noBtn.style.top = 'auto';
            noBtn.style.position = 'static';
            setTimeout(() => { noBtn.style.position = 'absolute'; }, 10);

            if (currentQuestion < questions.length) {
                qText.innerText = questions[currentQuestion];
            } else {
                startExplosionSequence();
            }
        });

        // وظيفة الانفجار النهائي وتساقط القلوب
        function startExplosionSequence() {
            yesBtn.classList.add('explosion-effect');
            
            qText.style.opacity = '0';
            document.getElementById('cat-visual').style.opacity = '0';
            document.getElementById('btns-holder').style.opacity = '0';

            // تفعيل تساقط القلوب
            for (let i = 0; i < 30; i++) { createHeart(); }

            setTimeout(() => {
                document.getElementById('btns-holder').style.display = 'none';
                qText.style.display = 'none';
                document.getElementById('cat-visual').style.display = 'none';
                finalMessage.style.display = 'block';
                mainContainer.style.background = 'transparent';
                mainContainer.style.boxShadow = 'none';
            }, 700);
        }

        // إنشاء قلب متساقط
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.animationDuration = Math.random() * 3 + 2 + "s"; // مدة مختلفة
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 5000); // إزالة القلب بعد السقوط
        }

    </script>
</body>
</html>

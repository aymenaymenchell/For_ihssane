<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى إحسان ❤️</title>
    <style>
        body {
            background-color: #ffeef2;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        .container {
            background-color: #fff;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(255, 182, 193, 0.5);
            text-align: center;
            width: 80%;
            max-width: 400px;
            transition: all 0.3s ease;
            position: relative;
            z-index: 10;
        }

        /* --- القطة اللطيفة --- */
        .cat-container { height: 160px; margin-bottom: 20px; display: flex; justify-content: center; align-items: center; position: relative; }
        .cat-normal { position: relative; width: 120px; height: 100px; display: block; }
        .cat-head { position: absolute; width: 100%; height: 100%; background-color: #f48fb1; border-radius: 50% 50% 40% 40%; bottom: 0; }
        .ear { position: absolute; width: 40px; height: 40px; background-color: #f48fb1; border-radius: 10px; z-index: -1; }
        .ear.left { top: -10px; left: 0; transform: rotate(-15deg); }
        .ear.right { top: -10px; right: 0; transform: rotate(15deg); }
        .eye { position: absolute; width: 12px; height: 12px; background-color: #333; border-radius: 50%; top: 35px; }
        .eye.left { left: 25px; } .eye.right { right: 25px; }
        .nose { position: absolute; width: 6px; height: 4px; background-color: #c2185b; border-radius: 50%; top: 55px; left: 50%; transform: translateX(-50%); }
        .mouth { position: absolute; width: 10px; height: 5px; border-bottom: 2px solid #333; border-radius: 50%; top: 60px; left: 50%; transform: translateX(-50%); }

        /* --- القطة الغاضبة --- */
        .cat-angry { position: relative; width: 120px; height: 100px; display: none; }
        .cat-angry .cat-head { background-color: #d81b60; }
        .cat-angry .eye { background-color: #ff0000; width: 14px; height: 4px; border-radius: 0; top: 38px; transform: rotate(-10deg); box-shadow: 0 0 5px #ff0000; }
        .cat-angry .eye.right { transform: rotate(10deg); }

        h1#question-text { color: #d81b60; font-size: 1.8em; margin-bottom: 20px; min-height: 2.4em; }

        /* تعديل المسافات هنا */
        .buttons-container { 
            display: flex; 
            justify-content: center; 
            gap: 40px; /* مسافة واضحة بين الأزرار */
            align-items: center; 
            position: relative; 
            height: 100px; /* زيادة الطول للسماح بالحركة */
        }
        
        button#yes-btn { background-color: #f48fb1; color: #fff; border: none; padding: 15px 30px; border-radius: 50px; font-size: 1.2em; cursor: pointer; transition: all 0.3s ease; z-index: 5; }
        
        /* جعل زر لالا ثابت في مكانه في البداية */
        button#no-btn { background-color: #f0f0f0; color: #888; border: none; padding: 10px 20px; border-radius: 50px; font-size: 1em; cursor: pointer; transition: all 0.2s ease; z-index: 10; }

        /* --- خانة "و الله" --- */
        #final-stage { display: none; margin-top: 20px; }
        #oallah-input { padding: 10px; border: 2px solid #f48fb1; border-radius: 10px; text-align: center; font-size: 1.1em; outline: none; width: 80%; margin-bottom: 10px; }
        #check-btn { background-color: #d81b60; color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; }

        .exploded-text { display: none; color: #d81b60; font-size: 2.5em; font-weight: bold; text-align: center; animation: popIn 0.5s ease; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); white-space: nowrap; z-index: 20; }
        @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        .explosion-effect { animation: explosion-animation 0.7s ease forwards; }
        @keyframes explosion-animation { 0% { transform: scale(1); } 100% { transform: scale(50); opacity: 0; } }

        /* القلوب المتساقطة */
        .heart { position: absolute; width: 15px; height: 15px; background-color: #f48fb1; transform: rotate(45deg); animation: fall 3s infinite linear; z-index: 1; }
        .heart::before, .heart::after { content: ""; position: absolute; width: 15px; height: 15px; background-color: #f48fb1; border-radius: 50%; }
        .heart::before { top: -7.5px; left: 0; } .heart::after { top: 0; left: -7.5px; }
        @keyframes fall { 0% { top: -50px; } 100% { top: 100vh; } }
    </style>
</head>
<body>

    <div class="container" id="main-container">
        <div class="cat-container" id="cat-visual">
            <div class="cat-normal" id="normal-state">
                <div class="ear left"></div><div class="ear right"></div>
                <div class="cat-head"><div class="eye left"></div><div class="eye right"></div><div class="nose"></div><div class="mouth"></div></div>
            </div>
            <div class="cat-angry" id="angry-state">
                <div class="ear left"></div><div class="ear right"></div>
                <div class="cat-head"><div class="eye left"></div><div class="eye right"></div><div class="nose"></div><div class="mouth"></div></div>
            </div>
        </div>

        <h1 id="question-text">تحبيني؟</h1>

        <div class="buttons-container" id="btns-holder">
            <button id="yes-btn">ايه</button>
            <button id="no-btn">لالا</button>
        </div>

        <div id="final-stage">
            <p style="color: #d81b60; font-weight: bold;">قولي و الله:</p>
            <input type="text" id="oallah-input" placeholder="اكتبي هنا...">
            <br>
            <button id="check-btn">تأكيد</button>
            <p id="error-feedback" style="color: red; font-size: 0.9em; margin-top: 10px;"></p>
        </div>

        <div class="exploded-text" id="final-message">انا ثان نحبك ❤️</div>
    </div>

    <script>
        const questions = ["تحبيني؟", "تحبيني بزاف؟", "تحبيني اكثر من اي واحد فالدنيا؟"];
        let currentQuestion = 0;
        let yesScale = 1;

        const yesBtn = document.getElementById('yes-btn');
        const noBtn = document.getElementById('no-btn');
        const qText = document.getElementById('question-text');
        const finalStage = document.getElementById('final-stage');
        const oallahInput = document.getElementById('oallah-input');
        const checkBtn = document.getElementById('check-btn');
        const errorFeedback = document.getElementById('error-feedback');

        // وظيفة تحريك زر لالا
        function moveNo() {
            // تحويل الزر إلى وضع مطلق فقط عند الحاجة للهرب
            noBtn.style.position = "absolute";
            
            // حساب حدود عشوائية بعيدة عن زر "ايه"
            const x = Math.random() * (window.innerWidth - 100) - window.innerWidth/2;
            const y = Math.random() * (window.innerHeight - 150) - window.innerHeight/2;
            
            noBtn.style.transform = `translate(${x}px, ${y}px)`;
        }

        noBtn.addEventListener('mouseover', moveNo);
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault(); // منع الضغط في الجوال وتفعيل الهرب
            moveNo();
        });

        // منطق نعم
        yesBtn.addEventListener('click', () => {
            currentQuestion++;
            yesScale += 1.2;
            yesBtn.style.transform = `scale(${yesScale})`;
            
            // إعادة تعيين القطة للحالة العادية إذا كانت غاضبة
            document.getElementById('normal-state').style.display = 'block';
            document.getElementById('angry-state').style.display = 'none';
            errorFeedback.innerText = "";

            if(currentQuestion < questions.length) {
                qText.innerText = questions[currentQuestion];
            } else {
                yesBtn.classList.add('explosion-effect');
                setTimeout(() => {
                    document.getElementById('btns-holder').style.display = 'none';
                    qText.innerText = "امممم صح؟";
                    finalStage.style.display = 'block';
                }, 700);
            }
        });

        // التأكد من كلمة "و الله"
        checkBtn.addEventListener('click', () => {
            const val = oallahInput.value.trim();
            if (val === "و الله" || val === "والله") {
                startHearts();
            } else {
                errorFeedback.innerText = `قتلك قولي و الله مشي "${val}" 😾`;
                document.getElementById('normal-state').style.display = 'none';
                document.getElementById('angry-state').style.display = 'block';
            }
        });

        function startHearts() {
            finalStage.style.display = 'none';
            qText.style.display = 'none';
            document.getElementById('cat-visual').style.display = 'none';
            document.getElementById('main-container').style.background = 'transparent';
            document.getElementById('main-container').style.boxShadow = 'none';
            document.getElementById('final-message').style.display = 'block';
            
            for (let i = 0; i < 50; i++) {
                const heart = document.createElement('div');
                heart.classList.add('heart');
                heart.style.left = Math.random() * 100 + "vw";
                heart.style.animationDuration = (Math.random() * 2 + 2) + "s";
                heart.style.delay = Math.random() * 2 + "s";
                document.body.appendChild(heart);
            }
        }
    </script>
</body>
</html>
